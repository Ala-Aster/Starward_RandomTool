<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星之翼 カスタムランダムセレクト</title>
    <style>
        /* ========================================================
           テーマごとのカラー変数定義
           ======================================================== */
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --section-bg: #252525;
            --card-bg: #2a2a2a;
            --list-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-sub: #aaa;
            --accent-color: #00ffcc;
            --border-color: #444;
            --accent-bg: rgba(0, 255, 204, 0.1);
            --btn-text: #121212;
        }

        [data-theme="light"] {
            --bg-color: #f5f5f7;
            --container-bg: #ffffff;
            --section-bg: #f0f0f2;
            --card-bg: #e8e8ec;
            --list-bg: #fafafa;
            --text-main: #1d1d1f;
            --text-sub: #555555;
            --accent-color: #0066cc;
            --border-color: #cccccc;
            --accent-bg: rgba(0, 102, 204, 0.1);
            --btn-text: #ffffff;
        }

        [data-theme="custom"] {
            --bg-color: #fbf9f1;
            --container-bg: #f7f4e9;
            --section-bg: #eee9da;
            --card-bg: #dfd9c6;
            --list-bg: #fbf9f1;
            --text-main: #000000;
            --text-sub: #444444;
            --accent-color: #d35400;
            --border-color: #cca47e;
            --accent-bg: rgba(211, 84, 0, 0.1);
            --btn-text: #ffffff;
        }

        /* 全体の基本スタイル */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            text-align: center;
            padding: 20px;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            max-width: 1000px;
            margin: 20px auto;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            transition: background 0.3s;
        }
        h1 { color: var(--accent-color); font-size: 28px; margin-bottom: 20px; transition: color 0.3s; }
        
        .theme-switcher {
            text-align: right;
            margin-bottom: 15px;
        }
        .btn-theme {
            background: var(--section-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            margin-left: 5px;
            transition: 0.2s;
        }
        .btn-theme:hover { border-color: var(--accent-color); }

        .settings-section {
            background: var(--section-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
            transition: background 0.3s;
        }
        .settings-section h3 { 
            margin-top: 0; 
            color: var(--accent-color); 
            border-bottom: 1px solid var(--border-color); 
            padding-bottom: 5px; 
            font-size: 16px; 
            transition: color 0.3s, border-color 0.3s;
        }
        .flex-wrap { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
        .checkbox-label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        
        .cost-group-title {
            grid-column: 1 / -1;
            font-weight: bold;
            color: var(--accent-color);
            background: var(--card-bg); 
            padding: 6px 10px;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 14px;
            transition: color 0.3s, background 0.3s;
        }
        .cost-group-title:first-child { margin-top: 0; }

        .char-pool-container {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            padding: 10px;
            background: var(--list-bg);
            border-radius: 5px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 8px;
            transition: border-color 0.3s, background 0.3s;
        }

        .btn-main {
            background-color: var(--accent-color); 
            color: var(--btn-text); 
            border: none;
            padding: 15px 40px; font-size: 20px; font-weight: bold;
            border-radius: 30px; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin: 20px 0;
        }
        .btn-main:hover { opacity: 0.9; transform: scale(1.02); }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
        }
        
        .player-card {
            background: var(--container-bg); 
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            transition: 0.3s;
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .player-title { font-size: 16px; font-weight: bold; color: var(--text-sub); margin-bottom: 12px; }
        
        .char-display { 
            width: 100%;
            min-height: 220px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
        }
        
        .char-img { 
            width: 140px; 
            height: 140px; 
            border-radius: 10px; 
            border: 2px solid var(--accent-color); 
            object-fit: cover; 
            margin-bottom: 12px; 
            background: var(--list-bg); 
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
            transition: border-color 0.3s;
        }
        
        /* レア画像選出時のエフェクト */
        .player-card.rare-selected {
            border-color: #ffcc00;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.6);
        }
        .player-card.rare-selected .char-img {
            border-color: #ffcc00;
        }
        .player-card.rare-selected .rare-badge {
            color: #ffcc00;
            font-size: 11px;
            font-weight: bold;
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .char-name { 
            font-size: 16px; 
            font-weight: bold; 
            word-break: break-all; 
            line-height: 1.3;
            margin-bottom: 6px;
        }
        .char-cost { 
            font-size: 13px; 
            color: var(--accent-color); 
            background: var(--accent-bg); 
            padding: 2px 10px; 
            border-radius: 10px; 
            font-weight: bold;
            transition: color 0.3s, background 0.3s;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="theme-switcher">
        <button class="btn-theme" onclick="setTheme('dark')">ダーク</button>
        <button class="btn-theme" onclick="setTheme('light')">ライト</button>
        <button class="btn-theme" onclick="setTheme('custom')">クリーム</button>
    </div>

    <h1>星之翼 カスタムランダムセレクト</h1>

    <div class="settings-section">
        <h3>1. コスト設定</h3>
        <div class="flex-wrap">
            <div>
                <strong>抽出コスト：</strong>
                <label class="checkbox-label" style="display:inline-flex;"><input type="checkbox" class="cost-filter" value="3.0" checked> 3.0</label>
                <label class="checkbox-label" style="display:inline-flex;"><input type="checkbox" class="cost-filter" value="2.5" checked> 2.5</label>
                <label class="checkbox-label" style="display:inline-flex;"><input type="checkbox" class="cost-filter" value="2.0" checked> 2.0</label>
                <label class="checkbox-label" style="display:inline-flex;"><input type="checkbox" class="cost-filter" value="1.5" checked> 1.5</label>
            </div>
            <div style="margin-left: auto; font-size: 12px; color: var(--text-sub); display: flex; align-items: center;">
                ※レア画像出現確率：10%
            </div>
        </div>

        <h3>2. キャラクターの個別オンオフ（BAN機能）</h3>
        <div class="char-pool-container" id="individual-toggle-container">
        </div>
    </div>

    <button class="btn-main" onclick="rollRandom()">キャラクターを選出する</button>

    <div class="grid-container">
        <div class="player-card" id="card-0">
            <div class="player-title">1人目</div>
            <div class="char-display" id="display-0"><div class="char-name">待機中</div></div>
        </div>
        <div class="player-card" id="card-1">
            <div class="player-title">2人目</div>
            <div class="char-display" id="display-1"><div class="char-name">待機中</div></div>
        </div>
        <div class="player-card" id="card-2">
            <div class="player-title">3人目</div>
            <div class="char-display" id="display-2"><div class="char-name">待機中</div></div>
        </div>
        <div class="player-card" id="card-3">
            <div class="player-title">4人目</div>
            <div class="char-display" id="display-3"><div class="char-name">待機中</div></div>
        </div>
    </div>
</div>

    { id: "c022", name: "フィービー", kana: "ふぃーびー", cost: "2.0", hasRare: 2 },

    // --- コスト 1.5 (5名) ---
    { id: "c001", name: "オーキッド", kana: "おーきっど", cost: "1.5" },
    { id: "c002", name: "スノーウォル", kana: "すのーうぉる", cost: "1.5" },
    { id: "c003", name: "カタリナ", kana: "かたりな", cost: "1.5" },
    { id: "c004", name: "ローランド", kana: "ろーらんど", cost: "1.5" },
    { id: "c005", name: "ヤミン", kana: "やみん", cost: "1.5", hasRare: 2 }
];

function setTheme(themeName) {
    if (themeName === 'dark') {
        document.documentElement.removeAttribute('data-theme');
    } else {
        document.documentElement.setAttribute('data-theme', themeName);
    }
}

window.onload = function() {
    const container = document.getElementById("individual-toggle-container");
    const costOrder = ["3.0", "2.5", "2.0", "1.5"];
    
    costOrder.forEach(targetCost => {
        let group = characterPool.filter(c => c.cost === targetCost);
        group.sort((a, b) => a.kana.localeCompare(b.kana, 'ja'));
        
        if (group.length > 0) {
            const titleDiv = document.createElement("div");
            titleDiv.className = "cost-group-title";
            titleDiv.innerText = `▼ コスト ${targetCost}`;
            container.appendChild(titleDiv);
            
            group.forEach(c => {
                const label = document.createElement("label");
                label.className = "checkbox-label";
                label.innerHTML = `<input type="checkbox" class="char-toggle" value="${c.cost}_${c.id}" checked> ${c.name}`;
                container.appendChild(label);
            });
        }
    });
};

function rollRandom() {
    const checkedCosts = Array.from(document.querySelectorAll('.cost-filter:checked')).map(el => el.value);
    const activeCharKeys = Array.from(document.querySelectorAll('.char-toggle:checked')).map(el => el.value);

    let filteredPool = characterPool.filter(c => {
        const charKey = `${c.cost}_${c.id}`;
        return checkedCosts.includes(c.cost) && activeCharKeys.includes(charKey);
    });

    for (let slot = 0; slot < 4; slot++) {
        const displayDiv = document.getElementById(`display-${slot}`);
        const cardDiv = document.getElementById(`card-${slot}`);

        cardDiv.classList.remove("rare-selected");

        if (filteredPool.length === 0) {
            displayDiv.innerHTML = '<div class="char-name" style="color:#ff4444; margin-top:90px;">候補なし</div>';
            continue;
        }

        const randomIndex = Math.floor(Math.random() * filteredPool.length);
        const selectedChar = filteredPool[randomIndex];

        filteredPool.splice(randomIndex, 1);

        // --------------------------------------------------------
        // 【アップデート】複数レア画像対応の選出ロジック
        // --------------------------------------------------------
        const RARE_PROBABILITY = 0.10; // 出現確率：10%
        let isRareSelected = false;
        let imageSuffix = "";

        // 「確率に当選」かつ「hasRareが設定されており、かつ1以上である」とき
        if (Math.random() < RARE_PROBABILITY && selectedChar.hasRare && selectedChar.hasRare >= 1) {
            isRareSelected = true;
            
            // 1から設定枚数(hasRareの数値)までの間でランダムに1つの数字を決める
            // 例: hasRareが2なら、1か2のどちらかになる
            const rareNum = Math.floor(Math.random() * selectedChar.hasRare) + 1;
            
            imageSuffix = "_rare" + rareNum; // 末尾を _rare1 や _rare2 に決定
            cardDiv.classList.add("rare-selected");
        }

        // URLを組み立てる (例: images/3.0/c001_rare2.png)
        const imgUrl = IMAGE_BASE_URL + "/" + selectedChar.cost + "/" + selectedChar.id + imageSuffix + ".png";
        
        displayDiv.innerHTML = `
            <img class="char-img" src="${imgUrl}" alt="${selectedChar.name}" onerror="this.src='https://via.placeholder.com/140?text=No+Image'">
            <div class="char-name">${selectedChar.name}</div>
            <div class="char-cost">${selectedChar.cost}</div>
            <div class="rare-badge">${isRareSelected ? '★ 運がいいね ★' : ''}</div>
        `;
    }
}
</script>

</body>
</html>
